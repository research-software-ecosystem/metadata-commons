about:
  dev_url: https://github.com/brentp/cyvcf2
  doc_url: https://brentp.github.io/cyvcf2
  home: https://github.com/brentp/cyvcf2
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: A cython wrapper around htslib built for fast parsing of Variant Call Format
    (VCF) files.
build:
  entry_points:
  - cyvcf2 = cyvcf2.__main__:cli
  number: 0
  run_exports:
  - null
  script:
  - export CFLAGS="${CFLAGS} -O3 -Wno-implicit-function-declaration -Wno-int-conversion"
  - export DYLD_LIBRARY_PATH="${BUILD_PREFIX}/lib:${DYLD_LIBRARY_PATH}"
  - export CYVCF2_HTSLIB_MODE=EXTERNAL
  - -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv
  skip: true
extra:
  additional-platforms:
  - linux-aarch64
  - osx-arm64
  identifiers:
  - doi:10.1093/bioinformatics/btx057
  - biotools:cyvcf2
package:
  name: cyvcf2
  version: 0.34.0
requirements:
  build:
  - null
  - null
  - cmake >=3.20
  - make
  - pkg-config
  host:
  - python
  - pip
  - scikit-build-core >=0.11
  - cython
  - htslib >=1.10
  - numpy >=2.0.0
  - numpy
  run:
  - python
  - coloredlogs
  - click
  - null
source:
  sha256: e9dc163719a722ce3057361a055faf0e923cbd778273881fff3ad7c1250f1ac0
  url: https://pypi.org/packages/source/c/cyvcf2/cyvcf2-0.34.0.tar.gz
test:
  commands:
  - cyvcf2 --help
  imports:
  - cyvcf2
