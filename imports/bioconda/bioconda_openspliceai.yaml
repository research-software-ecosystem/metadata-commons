about:
  description: 'OpenSpliceAI is an open-source, PyTorch-based reimplementation and
    extension

    of SpliceAI for splice-site prediction. It is distributed as a single

    `openspliceai` command with subcommands for create-data, train, transfer,

    calibrate, predict, and variant scoring, and ships pretrained models for

    several species.

    '
  dev_url: https://github.com/Kuanhao-Chao/OpenSpliceAI
  doc_url: https://ccb.jhu.edu/openspliceai/
  home: https://github.com/Kuanhao-Chao/OpenSpliceAI
  license: GPL-3.0-only
  license_family: GPL3
  license_file: LICENSE
  summary: Deep learning framework that decodes splicing across species
build:
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . --no-deps --no-build-isolation -vv
extra:
  identifiers:
  - doi:10.7554/eLife.107454
  recipe-maintainers:
  - Kuanhao-Chao
package:
  name: openspliceai
  version: 0.0.6
requirements:
  host:
  - python >=3.9
  - pip
  - setuptools
  - wheel
  run:
  - python >=3.9
  - pytorch >=2.2.1
  - numpy >=1.24.4
  - pandas >=1.5.3
  - h5py >=3.9.0
  - tqdm >=4.65.2
  - scikit-learn >=1.4.1
  - biopython >=1.83
  - matplotlib-base >=3.8.3
  - psutil >=5.9.2
  - pysam >=0.22.0
  - pyfaidx >=0.8.1.1
  - gffutils >=0.12
  - mappy >=2.28
source:
  sha256: 872a840bb513143f4499fdee79eccaefe9a49237a9767759e38abe727ab38d9c
  url: https://pypi.io/packages/source/o/openspliceai/openspliceai-0.0.6.tar.gz
test:
  commands:
  - openspliceai --help
  imports:
  - openspliceai
  - openspliceai.openspliceai
