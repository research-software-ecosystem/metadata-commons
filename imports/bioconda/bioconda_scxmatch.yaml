about:
  home: https://github.com/bionetslab/scxmatch
  license: MIT
  license_file: LICENSE
  summary: Python implementation for single-cell cross match test, an efficient implementation
    of Rosenbaum's test.
build:
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . -vv --no-deps --no-build-isolation
extra:
  recipe-maintainers:
  - annmoel
package:
  name: scxmatch
  version: 0.2.0
requirements:
  build:
  - python >=3.9
  host:
  - python >=3.9
  - hatchling
  - pip
  run:
  - python >=3.9
  - anndata >=0.10.9
  - scanpy >=1.10.3,<2
  - scipy >=1.13.1,<2
  - graph-tool >=2.92,<3
source:
  sha256: 9f6d0af58233a73d2b1ccbdee1263ffe27804f7e1a36d8db6594f06af1beb327
  url: https://github.com/bionetslab/scxmatch/releases/download/scxmatch-0.2.0/scxmatch-0.2.0.tar.gz
test:
  imports:
  - scxmatch
