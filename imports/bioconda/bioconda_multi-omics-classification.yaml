about:
  home: https://github.com/usegalaxy-eu/MultiOmicsClassification
  license: MIT
  summary: A FAIR Machine Learning Framework for Benchmarking, Feature Selection,
    and Hyperparameter Optimization of machine learning Models for Multiomics Data
    in Galaxy
build:
  noarch: python
  number: 0
  run_exports:
  - null
  script:
  - python -m pip install . --no-deps -vv
extra:
  recipe-maintainers:
  - renu-pal
package:
  name: multi-omics-classification
  version: 0.1.5
requirements:
  host:
  - python
  - pip
  - setuptools
  - wheel
  run:
  - python
  - numpy
  - pandas
  - scikit-learn
  - matplotlib-base
  - seaborn
  - imbalanced-learn
  - lightgbm
  - xgboost
  - pip
  - tabpfn
source:
  sha256: 541d4536c998a142552cb9594d9a70c73ab6f497c119742d70a6ca51b28f16a0
  url: https://github.com/usegalaxy-eu/MultiOmicsClassification/archive/refs/tags/v0.1.5.tar.gz
test:
  commands:
  - multiclasspredict --help
  imports:
  - multiclasspredict
