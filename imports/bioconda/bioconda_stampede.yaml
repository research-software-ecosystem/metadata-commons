  - adjustText
  - anndata
  - matplotlib-base
  - natsort
  - numpy
  - pandas <3
  - python-igraph
  - scanpy
  - scikit-learn
  - scipy
  - seaborn
  - statsmodels
source:
  sha256: ce504d7ebc0956fc38ae84ee252cb2181212cd3e07493c1074d8190c27644d37
  url: https://github.com/mhlangalab/stampede/archive/refs/tags/0.2.0.tar.gz
