  home: https://github.com/mhlangalab/stampede
  license: GPL-3.0-or-later
  license_family: GPL3
  license_file: LICENSE
  summary: Process & analyse STAMP data with ease!
build:
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . --no-deps --ignore-installed --no-cache-dir -vvv
extra:
  recipe-maintainers:
  - nvelthuijs
  - siebrenf
package:
  name: stampede
  version: 0.3.1
