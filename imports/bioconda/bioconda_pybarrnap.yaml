about:
  dev_url: https://github.com/moshi4/pybarrnap
  doc_url: https://github.com/moshi4/pybarrnap/blob/v0.5.2/README.md
  home: https://github.com/moshi4/pybarrnap
  license: GPL-3.0-or-later
  license_family: GPL3
  license_file: LICENSE
  summary: Python implementation of barrnap (Bacterial ribosomal RNA predictor).
build:
  entry_points:
  - pybarrnap = pybarrnap.scripts.pybarrnap:main
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . -vvv --no-deps --no-build-isolation --no-cache-dir
extra:
  recipe-maintainers:
  - moshi4
package:
  name: pybarrnap
  version: 0.5.2
requirements:
  host:
  - python >=3.9
  - hatchling ==1.26.3
  - pip
  run:
  - python >=3.9
  - biopython >=1.80
  - pyhmmer >=0.12.1
source:
  sha256: db47b824fd635197c73b527aedd82776e6a4e4688bd0f95e674c752ac9a5daf6
  url: https://pypi.io/packages/source/p/pybarrnap/pybarrnap-0.5.2.tar.gz
test:
  commands:
  - pybarrnap --help
  imports:
  - pybarrnap
