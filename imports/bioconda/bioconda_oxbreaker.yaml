about:
  description: OxBreaker is a GTK4-based interface that collects parameters and launches
    a Nextflow pipeline. The package bundles the Nextflow project files and assets
    so they are available at runtime.
  home: https://gitlab.com/rc-reding/OxBreaker
  license: LGPL-2.1
  license_file: LICENSE
  summary: GTK4 GUI wrapper that launches a Nextflow pipeline
build:
  noarch: python
  number: 0
  run_exports:
  - oxbreaker
  script: -m pip install . -vv && mkdir -p "$PREFIX/share/oxbreaker" && cp "$RECIPE_DIR/oxbreaker.desktop"
    "$PREFIX/share/oxbreaker/oxbreaker.desktop" && ( [ ! -f "$RECIPE_DIR/oxbreaker.png"
    ] || cp "$RECIPE_DIR/oxbreaker.png" "$PREFIX/share/oxbreaker/oxbreaker.png" )
    && mkdir -p "$PREFIX/bin" && cp "$RECIPE_DIR/oxbreaker-desktop-helper" "$PREFIX/bin/oxbreaker-desktop-helper"
    && chmod +x "$PREFIX/bin/oxbreaker-desktop-helper"
entry_points:
- oxbreaker = oxbreaker.gui:main
extra:
  identifiers:
  - doi:10.64898/2026.03.18.709804
  recipe-maintainers:
  - rc-reding
package:
  name: oxbreaker
  version: '1.1'
requirements:
  host:
  - python >=3.9
  - pip
  - setuptools
  - wheel
  run:
  - python >=3.9
  - pygobject
  - gtk4
  - gobject-introspection
  - cairo
  - pango
  - harfbuzz
  - glib
  - nextflow 25.*
source:
  sha256: 0794a71efc4d67db35229c5f942ea837743952632bac5b1112a8d9dc832c0c38
  url: https://gitlab.com/rc-reding/OxBreaker/-/archive/1.1/OxBreaker-1.1.tar.bz2
test:
  commands:
  - oxbreaker --help
  - nextflow -version
