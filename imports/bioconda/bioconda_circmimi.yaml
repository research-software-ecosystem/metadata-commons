about:
  dev_url: https://circmimi.genomics.sinica.edu.tw/
  doc_url: https://github.com/TreesLab/CircMiMi
  home: https://github.com/TreesLab/CircMiMi
  license: MIT
  summary: A package for constructing CLIP-seq data-supported "circRNA - miRNA - mRNA"
    interactions
build:
  noarch: python
  number: 0
  run_exports:
  - null
  script: ' -m pip install --no-deps --ignore-installed . -vv'
extra:
  recipe-maintainers:
  - razmia02
package:
  name: circmimi
  version: 0.18.5
requirements:
  host:
  - pip
  - python >=3.6
  - setuptools
  - click >=7.0
  - numpy >=1.17.2
  - pandas >=0.25.1
  - scipy >=1.7.3
  run:
  - python >=3.6
  - click >=7.0
  - sqlalchemy >=1.3.8
  - numpy >=1.17.2
  - pandas >=0.25.1
  - openpyxl
  - networkx >=2.4
  - lxml >=4.5.0
  - scipy >=1.7.3
  - statsmodels >=0.13.1
  - requests
  - tqdm
  - bedtools >=2.29.0
  - miranda
  - blat
  - blast
source:
  sha256: 5d189ce423637d956167a1a8c84f4bac332d65f5545340b0469daa70a0d2818d
  url: https://pypi.io/packages/source/c/circmimi/circmimi-0.18.5.tar.gz
test:
  commands:
  - circmimi_tools --help
  imports:
  - circmimi
