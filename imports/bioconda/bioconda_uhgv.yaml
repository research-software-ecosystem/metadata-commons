about:
  dev_url: https://github.com/snayfach/UHGV-classify
  doc_url: https://github.com/snayfach/UHGV-classify
  home: https://uhgv.jgi.doe.gov/
  license: BSD-3-Clause-LBNL
  license_file: LICENSE
  summary: Taxonomic classifier for the Unified Human Gut Virome Catalog
build:
  entry_points:
  - uhgv = uhgv.cli:cli
  noarch: python
  number: 0
  run_exports:
  - null
  script: ' -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv'
extra:
  recipe-maintainers:
  - apcamargo
package:
  name: uhgv
  version: 2.0.0
requirements:
  host:
  - pip
  - python >=3.10
  - uv-build >=0.11.17,<0.12.0
  run:
  - python >=3.10
  - click >=8.4.1
  - psutil >=7.2.2
  - pyrodigal-gv >=0.3.1
  - rich >=15.0.0
  - rich-click >=1.9.8
  - taxopy >=0.14.0
  - blast >=2.16,<3
  - diamond >=2.2,<3
source:
  sha256: 361faf099a40fceaa54aaa3001017f584f1a691760c1bb6082196884ce038a81
  url: https://pypi.org/packages/source/u/uhgv/uhgv-2.0.0.tar.gz
test:
  commands:
  - pip check
  - uhgv --help
  imports:
  - uhgv
  requires:
  - pip
  - python
