about:
  home: https://github.com/kircherlab/MPRAlib
  license: MIT
  license_file: LICENSE
  summary: Library to analyze count data of MPRA experiments.
build:
  entry_points:
  - mpralib = mpralib.cli:cli
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . -vv --no-deps --no-build-isolation
extra:
  recipe-maintainers:
  - visze
package:
  name: mpralib
  version: 0.10.6
requirements:
  host:
  - python >=3.10
  - setuptools
  - wheel
  - pip
  run:
  - python >=3.10
  - numpy
  - pandas
  - click
  - scikit-learn
  - scipy
  - anndata >=0.11.3
  - seaborn
  - matplotlib-base
  - jsonschema
  - tqdm
source:
  sha256: d5ae04827c6537456d3085c626a352f83c1384138edf8f06eef033e92dca24ab
  url: https://pypi.org/packages/source/m/mpralib/mpralib-0.10.6.tar.gz
test:
  commands:
  - pip check
  - mpralib --help
  imports:
  - mpralib
  requires:
  - pip
