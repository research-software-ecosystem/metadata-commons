about:
  dev_url: https://github.com/parsaghadermarzi/MetaTrawl
  home: https://github.com/parsaghadermarzi/MetaTrawl
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: Mutable registry and workflow bookkeeping for large ZipStrain/SRA profiling
    projects.
build:
  entry_points:
  - metatrawl = metatrawl.cli:cli
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . -vv --no-deps --no-build-isolation
extra:
  recipe-maintainers:
  - parsaghadermarzi
package:
  name: metatrawl
  version: 0.1.9
requirements:
  host:
  - python >=3.12
  - pip
  - poetry-core >=2.0
  run:
  - python >=3.12
  - click >=8.1
  - duckdb >=1.1
  - polars >=1.0
  - rich >=13.0
  - zipstrain >=0.10.0
  - sylph
  - samtools
  - bowtie2
  - prodigal
  - sra-tools >=2.11
  - ncbi-datasets-cli
source:
  sha256: 4c0c063d241828660246266b5c122b2458161bfaca2d94737f49f536af1b070a
  url: https://pypi.org/packages/source/m/metatrawl/metatrawl-0.1.9.tar.gz
test:
  commands:
  - metatrawl --help
  - zipstrain --help
  - sylph --version
  - samtools --version
  - bowtie2 --version
  - datasets --version
  - command -v prodigal
  - command -v prefetch
  - command -v fasterq-dump
  imports:
  - metatrawl
