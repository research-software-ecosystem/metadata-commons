about:
  home: https://pypi.org/project/tau-community-detection/
  license: MIT
  license_file: LICENSE
  summary: Community detection via Louvain/Leiden + Genetic Algorithm
build:
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . -vv --no-deps --no-build-isolation
extra:
  recipe-maintainers:
  - HillelCharbit
package:
  name: tau-community-detection
  version: 1.4.2
requirements:
  host:
  - python >=3.10
  - pip
  - setuptools
  run:
  - python >=3.10
  - networkx >=3.4
  - numpy >=2.0
  - python-igraph >=0.10
  - scikit-learn >=1.6
source:
  sha256: 565b8f0a13abf7a1cd3507f6144d548835d73383e32c2d1605bf11c3c8cb03ab
  url: https://pypi.io/packages/source/t/tau-community-detection/tau_community_detection-1.4.2.tar.gz
test:
  commands:
  - tau --help
  - pip check
  imports:
  - tau_community_detection
  requires:
  - pip
