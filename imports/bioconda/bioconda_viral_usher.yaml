about:
  dev_url: https://github.com/AngieHinrichs/viral_usher
  doc_url: https://github.com/AngieHinrichs/viral_usher
  home: https://github.com/AngieHinrichs/viral_usher
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: Easily configure and run a pipeline to build a tree of virus genomes using
    UShER
build:
  entry_points:
  - viral_usher = viral_usher.cli:main
  noarch: python
  number: 0
  run_exports:
  - null
  script: ' -m pip install . -vv'
extra:
  recipe-maintainers:
  - AngieHinrichs
package:
  name: viral_usher
  version: 0.11.0
requirements:
  host:
  - python >=3.11
  - pip
  - setuptools
  run:
  - python >=3.11
  - requests
  - biopython
  - docker-py
source:
  sha256: 212742d31300433cbfb711fcaf423f7c69c436b9580870b8b6cd13aa004a04fa
  url: https://files.pythonhosted.org/packages/f2/d9/be4922dfdc034c4810fd2a9c15268ab3a5b861b83c1a362aa7fc356f1bf6/viral_usher-0.11.0.tar.gz
test:
  commands:
  - viral_usher --help
  imports:
  - viral_usher
