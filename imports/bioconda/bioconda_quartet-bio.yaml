about:
  dev_url: https://github.com/aaranyue/quarTeT
  doc_url: https://github.com/aaranyue/quarTeT/blob/main/README.md
  home: https://github.com/aaranyue/quarTeT
  license: MIT
  license_family: MIT
  summary: A telomere-to-telomere toolkit for gap-free genome assembly and centromeric
    repeat identification.
build:
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . --no-deps --ignore-installed -vv
extra:
  identifiers:
  - doi:10.1093/hr/uhad127
  - biotools:quartet
package:
  name: quartet-bio
  version: 1.3.0
requirements:
  build:
  - python >=3.7
  - pip
  - setuptools
  run:
  - python >=3.7
  - r-base
  - r-rideogram
  - r-ggplot2
  - gnuplot
  - unimap
  - minimap2
  - mummer4
  - trf
  - cd-hit
  - blast
  - tidk
source:
  sha256: c9e18aefed3828c2ee1d0eecd3951bfccd9b28b7b6502fd827626b9c0d16b686
  url: https://github.com/aaranyue/quarTeT/archive/refs/tags/v1.3.0.tar.gz
test:
  commands:
  - quartet --help
  imports:
  - quartet
