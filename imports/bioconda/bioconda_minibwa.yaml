about:
  dev_url: https://github.com/lh3/minibwa
  home: https://github.com/lh3/minibwa
  license: GPL-2.0-or-later
  license_family: GPL2
  license_file: LICENSE.txt
  summary: Aligning short and accurate long reads to a reference genome, the successor
    of bwa-mem.
build:
  number: 0
  run_exports:
  - null
extra:
  additional-platforms:
  - linux-aarch64
package:
  name: minibwa
  version: '0.2'
requirements:
  build:
  - make
  - null
  - null
  host:
  - zlib
  - llvm-openmp
  run:
  - llvm-openmp
source:
  patches:
  - override-makefile.patch
  sha256: aacb2dabe78874923b1eea6197919c0f75e12de87bdf906fa4adf58a6ab1b25a
  url: https://github.com/lh3/minibwa/archive/v0.2.tar.gz
test:
  commands:
  - minibwa version | grep 0.2
  - minibwa 2>&1 | grep 'Usage'
  - test -e $PREFIX/lib/libminibwa.a
  - test -e $PREFIX/include/minibwa.h
