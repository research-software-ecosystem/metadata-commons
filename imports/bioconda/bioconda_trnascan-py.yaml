about:
  description: 'A command-line tool and library that drives Infernal covariance-model
    search

    with the tRNAscan-SE 2.0 models for tRNA gene detection, validated

    differentially against reference tRNAscan-SE 2.0 and faster on larger genomes.

    '
  dev_url: https://github.com/Rome-1/trnascan-py
  home: https://github.com/Rome-1/trnascan-py
  license: GPL-3.0-or-later
  license_family: GPL3
  license_file: LICENSE
  summary: Fast Python interface for tRNA gene detection (drives Infernal / tRNAscan-SE
    2.0)
build:
  entry_points:
  - trnascan-py = trnascan_py.cli:main
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . -vv --no-deps --no-build-isolation
extra:
  recipe-maintainers:
  - Rome-1
package:
  name: trnascan-py
  version: 0.1.0
requirements:
  host:
  - python >=3.10
  - pip
  - hatchling
  run:
  - python >=3.10
  - trnascan-se >=2.0
  - infernal >=1.1
source:
  sha256: 65ff223b430815f22c87357cc9bd40e3f4021a1e36e85fe9ad73f5b263420897
  url: https://github.com/Rome-1/trnascan-py/archive/refs/tags/v0.1.0.tar.gz
test:
  commands:
  - trnascan-py --version
  - trnascan-py version
  - cmsearch -h > /dev/null
  imports:
  - trnascan_py
