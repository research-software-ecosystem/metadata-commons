about:
  home: https://github.com/abdealijivaji/ViralRecall
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: Tool to identify giant viruses integrated into eukaryotic genomes
build:
  noarch: python
  number: 0
  run_exports:
  - null
  script: ' -m pip install . -vv'
extra:
  recipe-maintainers:
  - abdealijivaji
package:
  name: viralrecall
  version: 3.1.0
requirements:
  host:
  - python >=3.10,<3.14
  - pip
  - setuptools
  run:
  - python >=3.10,<3.14
  - numpy >=2.2,<2.3
  - pandas >=2.2,<2.3
  - matplotlib-base >=3.10,<3.11
  - requests >=2.32,<2.33
  - progressbar >=2.5
  - pyfaidx ==0.9.0
  - pyhmmer >=0.11.3
  - pyrodigal-gv >=0.3
  - scikit-learn ==1.8.*
  - joblib ==1.5.*
source:
  sha256: 7836797dcaf1370b9867a5aa5892c3066fe94cac5da8a4ca8a933bae4aa48151
  url: https://github.com/abdealijivaji/ViralRecall/archive/refs/tags/v3.1.0.tar.gz
test:
  commands:
  - viralrecall --version
  imports:
  - viralrecall
