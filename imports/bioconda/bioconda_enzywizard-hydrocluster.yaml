about:
  description: 'EnzyWizard-HydroCluster detects hydrophobic clusters formed by ILE,
    VAL, and LEU residues

    in cleaned protein structures (CIF/PDB). It estimates side-chain contact areas
    using

    sphere sampling and neighbor search, builds a contact graph with NetworkX, and
    identifies

    connected components as clusters. Outputs statistics and per-cluster residue details
    in JSON.

    Useful for analyzing hydrophobic cores and protein stability.

    '
  home: https://github.com/bioinfbrad/enzywizard-hydrocluster
  license: MIT
  license_file: LICENSE
  summary: Command-line tool to identify hydrophobic clusters (ILE, VAL, LEU) in cleaned
    protein structures using contact area estimation and graph clustering, outputting
    a detailed JSON report.
build:
  noarch: python
  number: 0
  run_exports:
  - null
  script: ' -m pip install . -vv --no-deps --no-build-isolation'
extra:
  recipe-maintainers:
  - khaled196
  - Mingkai14
package:
  name: enzywizard-hydrocluster
  version: 1.0.2
requirements:
  host:
  - python >=
  - pip
  - setuptools
  - setuptools-git-versioning >=2.0,<3
  run:
  - python >=
  - biopython
  - numpy
  - scipy
  - networkx
  - packaging
source:
  sha256: 95790293fd1f81caaf94be6012cc521571cbb5fb49d6c5b14ba056068f368b81
  url: https://github.com/bioinfbrad/enzywizard-hydrocluster/archive/refs/tags/1.0.2.tar.gz
test:
  commands:
  - enzywizard-hydrocluster --help
  imports:
  - enzywizard_hydrocluster
  - enzywizard_hydrocluster.cli
  - enzywizard_hydrocluster.services.hydrocluster_service
  - enzywizard_hydrocluster.algorithms.hydrocluster_algorithms
