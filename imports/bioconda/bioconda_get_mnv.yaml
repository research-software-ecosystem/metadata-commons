about:
  description: 'get_MNV is a tool designed to identify Multi-Nucleotide Variants (MNVs)
    within the same codon in genomic sequences, providing more accurate annotation
    for genomic data. Pure Rust implementation with no C dependencies.

    '
  dev_url: https://github.com/PathoGenOmics-Lab/get_mnv
  doc_url: https://github.com/PathoGenOmics-Lab/get_mnv
  home: https://github.com/PathoGenOmics-Lab/get_mnv
  license: AGPL-3.0-or-later
  license_family: AGPL
  license_file:
  - LICENSE
  - THIRDPARTY.yml
  summary: Tool to identify Multi-Nucleotide Variants (MNVs) in genomic sequences.
build:
  number: 0
  run_exports:
  - null
  script: 'set -xe

    export LANG=C.UTF-8

    export LC_ALL=C.UTF-8

    export RUST_BACKTRACE=1

    cargo-bundle-licenses --format yaml --output THIRDPARTY.yml

    cargo install --no-track --locked --verbose --root "${PREFIX}" --path . --bin
    get_mnv

    '
extra:
  additional-platforms:
  - linux-aarch64
  - osx-arm64
  categories:
  - Genomics
  - Variant Analysis
  recipe-maintainers:
  - paururo
  - PathoGenOmics-Lab
package:
  name: get_mnv
  version: 1.1.4
requirements:
  build:
  - null
  - null
  - null
  - cargo-bundle-licenses
  - pkg-config
source:
  sha256: 482f3d0c4cb41134c37559c0b7cf9b9a6076a8075930804a13a64752c19ff0ec
  url: https://github.com/PathoGenOmics-Lab/get_mnv/archive/refs/tags/1.1.4.tar.gz
test:
  commands:
  - get_mnv --help
  - get_mnv --version
