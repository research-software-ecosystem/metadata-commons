about:
  description: 'Interactive WebGL scatterplots for single-cell / spatial data in Python

    (AnnData, MuData, SpatialData, pandas, numpy). Renders millions of points in

    the browser via regl-scatterplot, with a draggable legend, distribution-slider

    filtering, lasso selection with round-trip to Python, tooltips and PNG/SVG/PDF

    export. The Python companion to the R package reglScatterplotR; both drive the

    same compiled widget so plots look identical across R and Python.

    '
  dev_url: https://github.com/george123ya/reglscatterpy
  doc_url: https://github.com/george123ya/reglscatterpy
  home: https://github.com/george123ya/reglscatterpy
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: Interactive WebGL scatterplots for single-cell data (AnnData/MuData/SpatialData)
    in Jupyter, VS Code and Colab
build:
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . -vv --no-deps --no-build-isolation
extra:
  recipe-maintainers:
  - george123ya
package:
  name: reglscatterpy
  version: 0.6.8
requirements:
  host:
  - python >=3.9
  - hatchling
  - pip
  run:
  - python >=3.9
  - numpy
  - pandas
  - anywidget >=0.9
  - jupyter-ui-poll >=0.2
source:
  sha256: a49f102967d9c687a59084cfc5e6df9c8e3bb82d7322867c949af21f43f4de23
  url: https://pypi.org/packages/source/r/reglscatterpy/reglscatterpy-0.6.8.tar.gz
test:
  commands:
  - reglscatterpy-report --help
  - pip check
  imports:
  - reglscatterpy
  requires:
  - pip
