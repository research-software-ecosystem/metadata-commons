about:
  description: Needle is a tool for approximately quantifiying many queries in large
    collections of nucleotide sequences.
  dev_url: https://github.com/seqan/needle
  doc_url: https://github.com/seqan/needle/blob/needle-v1.0.3/README.md
  home: https://www.seqan.de/apps/needle
  license: BSD-3-Clause
  license_family: BSD
  license_file: LICENSE.md
  summary: 'Needle: A fast and space-efficient pre-filter for the quantification of
    very large collections of nucleotide sequences'
build:
  number: 0
  run_exports:
  - null
extra:
  additional-platforms:
  - linux-aarch64
  - osx-arm64
  identifiers:
  - doi:10.1093/bioinformatics/btac492
  recipe-maintainers:
  - mitradarja
  - eseiler
package:
  name: needle
  version: 1.0.3
requirements:
  build:
  - ninja
  - null
  - null
  - cmake >=3.12
  host:
  - bzip2
  - zlib
  - llvm-openmp
source:
  sha256: 4e0d468e5864ec6cd6f1a80a4741f6d0852eff3e1bf824b474ef5e2fc1f72ce4
  url: https://github.com/seqan/needle/releases/download/needle-v1.0.3/needle-1.0.3-Source.tar.xz
test:
  commands:
  - needle --version
  - needle --help 2>&1 > /dev/null
  - needle count --help 2>&1 > /dev/null
  - needle ibf --help 2>&1 > /dev/null
  - needle ibfmin --help 2>&1 > /dev/null
  - needle minimiser --help 2>&1 > /dev/null
  - needle estimate --help 2>&1 > /dev/null
