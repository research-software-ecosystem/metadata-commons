about:
  home: https://github.com/hiruna72/squigualiser
  license: MIT
  license_file: LICENSE
  summary: Visualise ONT raw signals
build:
  entry_points:
  - squigualiser=src.__init__:main
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . -vv --no-deps --no-build-isolation
extra:
  recipe-maintainers:
  - hiruna72
package:
  name: squigualiser
  version: 0.7.0
requirements:
  host:
  - python >=3.8
  - numpy
  - pip
  - setuptools
  run:
  - python >=3.8
  - bokeh ==3.1.1
  - numpy
  - pyslow5
  - pyfaidx
  - pyfastx
  - pysam
  - matplotlib-base ==3.7
  - seaborn
  - selenium
  - pandas <2.3
source:
  sha256: cf896b42ae5e12d39a8fa1ad436be874a3e7a70f63c4d9218ea2864bac899735
  url: https://pypi.io/packages/source/s/squigualiser/squigualiser-0.7.0.tar.gz
test:
  commands:
  - pip check
  - squigualiser --help
  imports:
  - src
  requires:
  - pip
