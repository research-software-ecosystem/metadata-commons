about:
  dev_url: https://github.com/GenomicParisCentre/toulligQC
  doc_url: https://github.com/GenomiqueENS/toulligQC/blob/v2.9.1/README.md
  home: https://github.com/GenomicParisCentre/toulligQC
  license: GPL-3.0-or-later
  license_family: GPL3
  license_file: LICENSE.txt
  summary: A post sequencing QC tool for Oxford Nanopore sequencers.
build:
  entry_points:
  - toulligqc = toulligqc.toulligqc:main
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv
extra:
  identifiers:
  - biotools:ToulligQC
package:
  name: toulligqc
  version: 2.9.1
requirements:
  host:
  - python >=3.11
  - pip
  - setuptools
  - hatchling
  run:
  - h5py >=3.10.0
  - matplotlib-base >=3.6.3
  - numpy >=1.26.4
  - scipy >=1.11.4
  - pandas >=2.1.4,<3.0.0
  - plotly >=5.15.0,<6.0.0
  - pysam >=0.22.0
  - python >=3.11
  - scikit-learn >=1.4.1
  - tqdm >=4.66.2
  - pod5 >=0.3.15
  - ezcharts >=0.15.2
source:
  sha256: e9d61b1742bfac4ca468537ebc5c4f8712ba2362eca65a5451bfc644856d8544
  url: https://pypi.org/packages/source/t/toulligqc/toulligqc-2.9.1.tar.gz
test:
  commands:
  - toulligqc --help
  imports:
  - toulligqc
