about:
  description: 'isiteuk classifies genomes by domain (Bacteria, Archaea, Eukaryota)
    using

    SingleM marker genes.

    '
  dev_url: https://github.com/wwood/isiteuk
  home: https://github.com/wwood/isiteuk
  license: GPL-3.0-or-later
  license_family: GPL3
  license_file: LICENCE.txt
  summary: Domain classification of genomes using SingleM marker genes
build:
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv
package:
  name: isiteuk
  version: 0.0.2
requirements:
  host:
  - python >=3.7
  - pip
  - setuptools
  run:
  - python >=3.7, <3.12
  - singlem >=0.18.0
  - polars >1.0.0
  - diamond >=2.1.21
  - zenodo_backpack >=0.3
source:
  sha256: b788007493a8241dab9677eeb52ca86105e2352bf56896e5cb6922f7c4290ca5
  url: https://pypi.io/packages/source/i/isiteuk/isiteuk-0.0.2.tar.gz
test:
  commands:
  - isiteuk --version
  - isiteuk --help
  imports:
  - isiteuk
