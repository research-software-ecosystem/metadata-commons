about:
  dev_url: https://github.com/LucoDevro/cfoldseeker
  doc_url: https://cfoldseeker.readthedocs.io/en/stable/
  home: https://github.com/LucoDevro/cfoldseeker
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: Tool to find gene clusters using protein structure similarity
build:
  entry_points:
  - cfoldseeker = cfoldseeker.main:main
  - cfoldseeker-cds = cfoldseeker.build_cds_db:main
  - cfoldseeker-seqs = cfoldseeker.extract_sequences:main
  noarch: python
  number: 1
  run_exports:
  - null
  script: ' -m pip install . -vvv --no-build-isolation --no-cache-dir'
extra:
  recipe-maintainers:
  - LucoDevro
package:
  name: cfoldseeker
  version: 0.2.0
requirements:
  host:
  - python >=3.12
  - pip
  - setuptools
  run:
  - python >=3.12
  - biopython
  - cblaster >=1.4.0
  - polars >=1.0.0
  - foldseek
  - networkx
  - requests
  - tqdm
  - kegg_pull
source:
  sha256: 79e867556dae491b8585a62303bd84f37cea745e2aed6c98afca352e58c93d8b
  url: https://pypi.org/packages/source/c/cfoldseeker/cfoldseeker-0.2.0.tar.gz
test:
  commands:
  - cfoldseeker -h
