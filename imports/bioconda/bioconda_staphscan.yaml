about:
  doc_url: https://staphscan.readthedocs.io/en/latest
  home: https://github.com/riccabolla/StaphSCAN
  license: MIT
  license_file: LICENSE
  summary: A tool for Staphylococcus aureus analysis.
build:
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . --no-deps --no-build-isolation -vv
extra:
  recipe-maintainers:
  - riccabolla
package:
  name: staphscan
  version: 0.4.0
requirements:
  host:
  - python >=3.10
  - pip
  - setuptools
  run:
  - python >=3.10
  - pandas
  - biopython >=1.78
  - blast
  - mash >=2.0
  - rauth
  - requests
source:
  sha256: 92239421c753ebac71a665707de579288f99b60f23a4abe64c80c3d95966adb8
  url: https://github.com/riccabolla/StaphSCAN/archive/refs/tags/v0.4.0.tar.gz
test:
  commands:
  - staphscan --help
