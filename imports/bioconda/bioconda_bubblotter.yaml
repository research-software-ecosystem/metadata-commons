about:
  dev_url: https://github.com/codialab/bubblotter
  home: https://github.com/codialab/bubblotter
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: bubblotter is a simple tool for plotting structural variant bubbles in
    a GFA pangenome graph.
build:
  noarch: python
  number: 0
  run_exports:
  - null
  script: ' -m pip install . -vv'
extra:
  recipe-maintainers:
  - heringerp
package:
  name: bubblotter
  version: 0.1.0
requirements:
  host:
  - python >=3.8
  - pip
  - setuptools
  run:
  - python >=3.8
  - numpy
  - scipy
  - matplotlib-base
  - vg
  - bandage
  - bubblegun
source:
  sha256: 8881e5eba922a8186da698c16bc5da1a5642aa114a7a94a595181b8c8840ce9d
  url: https://github.com/codialab/bubblotter/archive/refs/tags/v0.1.0.tar.gz
test:
  commands:
  - bubblotter --version | grep 0.1.0
