about:
  dev_url: https://github.com/OlmLab/ZipStrain
  home: https://github.com/OlmLab/ZipStrain
  license: MIT
  license_family: MIT
  summary: Fast strain-level metagenomics
build:
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . --no-deps --ignore-installed -vv
package:
  name: zipstrain
  version: 0.11.1
requirements:
  host:
  - python >=3.12
  - poetry-core
  - pip
  run:
  - python >=3.12
  - samtools
  - click
  - polars
  - plotly
  - numpy
  - seaborn
  - scipy
  - pyarrow
  - aiofiles
  - pydantic >=2,<3
  - rich
  - psutil
  - duckdb
  - pandas
  - matplotlib-base
  - h5py
  - pytorch
source:
  sha256: d57e5381aea497c9f92d611763370c457e9eed3b954eeb6feb6ee160c20942ad
  url: https://pypi.io/packages/source/z/zipstrain/zipstrain-0.11.1.tar.gz
test:
  commands:
  - zipstrain --help
  - samtools --version
  - zipstrain compare --help
  - zipstrain utilities --help
  imports:
  - zipstrain
