about:
  dev_url: https://github.com/Yasas1994/Jaeger
  doc_url: https://jaeger-docs.readthedocs.io/
  home: https://github.com/Yasas1994/Jaeger
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: A quick and precise pipeline for detecting phages in sequence assemblies.
build:
  noarch: python
  number: 0
  run_exports:
  - null
  script: ' -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv'
extra:
  identifiers:
  - biotools:jaeger
  recipe-maintainers:
  - Yasas1994
package:
  name: jaeger-bio
  version: 1.26.4
requirements:
  host:
  - python >=3.11,<3.14
  - pip
  - setuptools
  - pdm-backend
  run:
  - python >=3.11,<3.14
  - pip
  - tensorflow
  - keras >=3.12.0
  - h5py >=3.0
  - joblib >=1.0
  - kneed >=0.8.5
  - matplotlib-base >=3.7
  - numpy >=1.24
  - pandas >=2.2.3
  - polars >=1.2.6
  - parasail-python ==1.3.4
  - psutil >=7.0.0
  - click >=8.1
  - pycirclize
  - pyfastx >=2
  - requests >=2.0
  - rich >=13.0
  - ruptures >=1.1.9
  - scikit-learn >=1.6.0
  - scipy >=1.10
  - seaborn >=0.13.0
  - pyyaml >=6.0.2
  - jinja2 >=3.1
  - pydustmasker >=1.0.3
source:
  sha256: 262a896fd7254f30461155ab0157f75a350c3f2b9f7ad38c082273981af32dd7
  url: https://pypi.io/packages/source/j/jaeger-bio/jaeger_bio-1.26.4.tar.gz
test:
  commands:
  - jaeger --help
  - jaeger predict --help
  imports:
  - jaeger
  - jaeger.data
  - jaeger.nnlib
