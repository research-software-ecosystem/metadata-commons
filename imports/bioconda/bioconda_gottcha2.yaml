about:
  dev_url: https://github.com/poeli-lanl/GOTTCHA2
  doc_url: https://github.com/poeli-lanl/GOTTCHA2/wiki
  home: https://github.com/poeli-lanl/GOTTCHA2
  license: BSD-3
  license_family: BSD
  license_file: LICENSE
  summary: Genomic Origin Through Taxonomic CHAllenge (GOTTCHA) v2.
build:
  entry_points:
  - gottcha2 = gottcha.gottcha2:cli
  noarch: python
  number: 1
  run_exports:
  - null
  script: -m pip install -vvv --no-deps --no-build-isolation --no-cache-dir .
extra:
  identifiers:
  - biotools:gottcha2
package:
  name: gottcha2
  version: 2.4.0
requirements:
  host:
  - python >=3.9
  - pip
  - setuptools
  - pandas
  run:
  - python >=3.9
  - minimap2 >=2.17
  - gawk
  - biom-format >=2.1.7
  - numpy
  - pandas
  - requests
  - tqdm
  - pysam >=0.22.0
source:
  sha256: 96f3f2433eb96dd185851e65d6d52fc7d134eaa43cbb6de805a94c0aa43a0006
  url: https://github.com/poeli-lanl/GOTTCHA2/archive/refs/tags/2.4.0.tar.gz
test:
  commands:
  - minimap2 -h
  - python -c "import gottcha.gottcha2 as g; assert g.__version__ == '2.4.0'"
  - gottcha2 version
