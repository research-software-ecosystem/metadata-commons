about:
  home: https://github.com/bricoletc/delfies
  license: MIT
  license_file: LICENSE
  summary: delfies is a tool for the detection of DNA Elimination breakpoints
build:
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . -vv --no-deps --no-build-isolation
extra:
  dev_url: https://github.com/bricoletc/delfies
  identifiers:
  - doi:10.21105/joss.07385
  recipe-maintainers:
  - kbseah
package:
  name: delfies
  version: 0.11.0
requirements:
  host:
  - python >=3.9,<4.0
  - hatchling
  - pip
  run:
  - python >=3.9.0,<4.0.0
  - pysam >=0.22.0,<0.23.0
  - pybedtools >=0.9.1,<0.10.0
  - click >=8.1.7,<9.0.0
  - rich-click >=1.7.3,<2.0.0
  - pyfastx >=2.1.0,<3.0.0
  - datasci-bricoletc >=0.1.1,<0.2.0
  - edlib >=1.3.9,<2.0.0
source:
  sha256: 569c99d7632e52c8174faab919724f6624d41b9c759f98c10c179e700bdd8d5f
  url: https://pypi.org/packages/source/d/delfies/delfies-0.11.0.tar.gz
test:
  commands:
  - pip check
  - delfies --help
  imports:
  - delfies
  requires:
  - pip
