about:
  home: https://gitlab.pasteur.fr/dbikard/crisprbact
  license: GPL-3.0-or-later
  license_family: GPL3
  license_file: LICENSE
  summary: Tools to design and analyse CRISPRi experiments
build:
  entry_points:
  - crisprbact = crisprbact.cli:main
  noarch: python
  number: 0
  run_exports:
  - null
  script: ' -m pip install . --ignore-installed --no-deps -vv'
extra:
  recipe-maintainers:
  - rplanel
package:
  name: crisprbact
  version: 1.4.1
requirements:
  host:
  - pip
  - python >=3.10,<4
  - hatchling
  run:
  - python >=3.10,<4
  - biopython >=1.79,<2.0
  - click >=8.0,<9.0
  - numpy >=1.21,<3.0
  - pandas >=1.3
  - tqdm >=4.40
  - matplotlib-base >=3.5
source:
  sha256: ccdd268519cb2e5e29caa96e03233583ccff49e07c299b9600d87cd4bd6b5a7e
  url: https://pypi.io/packages/source/c/crisprbact/crisprbact-1.4.1.tar.gz
test:
  commands:
  - crisprbact --help
  imports:
  - crisprbact
