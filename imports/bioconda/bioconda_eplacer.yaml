about:
  home: https://github.com/NEFSC/PEMAD-PBB-ePlacer
  license: Public Domain
  license_file: LICENSE.txt
  summary: A deep learning approach to taxonomic assignment
build:
  entry_points:
  - eplacer = eplacer.__main__:main
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . --no-deps --no-build-isolation -vv
extra:
  recipe-maintainers:
  - ccpowers-NOAA
package:
  name: eplacer
  version: 0.1.5
requirements:
  host:
  - python >=3.12
  - pip
  - setuptools
  run:
  - python >=3.12
  - pytorch >=2.5
  - torchvision
  - torchinfo
  - blast >=2.16
  - mafft
  - trimal
  - entrez-direct
  - ncbi-acc-download
  - numpy
  - pandas
  - scipy
  - scikit-learn
  - networkx
  - shapely
  - sympy
  - tqdm
  - pyyaml
  - requests
  - click
  - docopt
  - pygeohash
source:
  sha256: 2e292a3e40f3b875efd1c947fe0cae4bffc14bf6101aecd6b21adfb85856d25f
  url: https://files.pythonhosted.org/packages/48/b2/3bd8d07c231a0bc800149e95876e639f5ad74c29a2f08c2a63e6eaa1c277/eplacer-0.1.5.tar.gz
test:
  commands:
  - eplacer --help
  imports:
  - eplacer
