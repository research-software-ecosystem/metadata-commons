about:
  description: 'EnzyWizard-Disorder predicts intrinsically disordered regions from
    cleaned protein

    structures (CIF/PDB). It extracts the sequence using Biopython and applies a

    sliding-window FoldIndex-like score based on residue hydrophobicity and net charge.

    Outputs a structured JSON report with disordered region statistics and residue
    details.

    Useful for structural bioinformatics and protein disorder analysis.

    '
  home: https://github.com/bioinfbrad/enzywizard-disorder
  license: MIT
  license_file: LICENSE
  summary: Command-line tool to predict intrinsically disordered regions (IDRs) from
    a cleaned protein structure using a FoldIndex-like algorithm based on hydrophobicity
    and net charge.
build:
  noarch: python
  number: 0
  run_exports:
  - null
  script: ' -m pip install . -vv --no-deps --no-build-isolation'
extra:
  recipe-maintainers:
  - khaled196
  - Mingkai14
package:
  name: enzywizard-disorder
  version: 1.0.2
requirements:
  host:
  - python >=
  - pip
  - setuptools
  - setuptools-git-versioning >=2.0,<3
  run:
  - python >=
  - biopython
  - numpy
  - packaging
source:
  sha256: edf58429318c542b856712aeaeb5e7414665c5897e942dbb62a3c8668be98058
  url: https://github.com/bioinfbrad/enzywizard-disorder/archive/refs/tags/1.0.2.tar.gz
test:
  commands:
  - enzywizard-disorder --help
  imports:
  - enzywizard_disorder
  - enzywizard_disorder.cli
  - enzywizard_disorder.services.disorder_service
  - enzywizard_disorder.algorithms.disorder_algorithms
  - enzywizard_disorder.resources.aa_physicochemical_props
