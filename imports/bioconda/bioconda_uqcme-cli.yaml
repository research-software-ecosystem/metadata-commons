about:
  description: 'uQCme is quality control software for data derived from next-generation

    whole genome sequencing of microbes. This package installs the CLI-only

    profile for processing sequencing run metrics with configurable QC rules.

    '
  dev_url: https://github.com/ssi-dk/uQCme
  home: https://github.com/ssi-dk/uQCme
  license: MIT
  license_file: LICENSE
  summary: CLI-only microbial sequencing quality control tool
build:
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install ".[cli]" -vv --no-deps --no-build-isolation
extra:
  recipe-maintainers:
  - PovilasMat
  - kimleeng
package:
  name: uqcme-cli
  version: 0.9.2
requirements:
  host:
  - python >=3.12,<3.15
  - pip
  - hatchling
  run:
  - python >=3.12,<3.15
  - pandas >=2.0.0,<3
  - pyyaml >=6.0
  - pydantic >=2.0.0
  - pandera >=0.30.0,<0.31
  - requests >=2.31.0
source:
  sha256: 06f29c94755556590cf48f23b19284ee57a99c1583898e352997c7ab668beac7
  url: https://pypi.io/packages/source/u/uqcme/uqcme-0.9.2.tar.gz
test:
  commands:
  - uqcme --help
  imports:
  - uQCme
  - uQCme.cli
  - uQCme.core
