about:
  dev_url: https://github.com/cmmr/EsViritu
  home: https://github.com/cmmr/EsViritu
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: Read mapping pipeline for detection and measurement of human and animal
    virus pathogens from short read metagenomic environmental or clinical samples.
build:
  entry_points:
  - EsViritu = EsViritu:esviritu
  - summarize_esv_runs = EsViritu.summarize_esv_runs:summarize_esv_runs
  - esv_create_taxonomy = EsViritu.esv_create_taxonomy:main
  - esv_combine_tax = EsViritu.esv_combine_tax:main
  noarch: python
  number: 0
  run_exports:
  - null
  script: -m pip install . -vvv --no-deps --no-build-isolation --no-cache-dir
extra:
  identifiers:
  - doi:10.1038/s41467-023-42064-1
  recipe-maintainers:
  - mtisza1
package:
  name: esviritu
  version: 1.3.1
requirements:
  host:
  - python >=3.11
  - setuptools >=61.0
  - pip
  run:
  - python >=3.11
  - numpy
  - polars
  - pysam
  - pyyaml
  - minimap2 >=2.21
  - samtools >=1.15
  - fastp >=0.23.2
  - seqkit
  - r-base
  - r-htmltools
  - r-scales
  - r-reactable
  - r-reactablefmtr
  - r-magrittr
  - r-remotes
source:
  sha256: 1392dfc755ff6f4a639cc39f1b3a310d8b5560965facf7b0d32b8881a05a497e
  url: https://github.com/cmmr/EsViritu/archive/v1.3.1.tar.gz
test:
  commands:
  - pip check
  - EsViritu --help
  imports:
  - EsViritu
