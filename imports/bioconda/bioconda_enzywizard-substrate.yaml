about:
  description: 'EnzyWizard-Substrate processes small-molecule substrates either from
    common names

    (resolved via ChEBI/PubChem) or direct SMILES strings. It uses RDKit to generate

    3D conformations and computes physicochemical properties. Outputs a structured
    JSON

    report plus SDF files for the 3D substrate structures.

    Designed to work alongside other EnzyWizard tools for complete enzyme-substrate
    analysis.

    '
  home: https://github.com/bioinfbrad/enzywizard-substrate
  license: MIT
  license_file: LICENSE
  summary: Command-line tool to process small-molecule substrates (from name or SMILES),
    generate 3D structures (SDF), and produce a detailed JSON report with physicochemical
    properties.
build:
  noarch: python
  number: 0
  run_exports:
  - null
  script: ' -m pip install . -vv --no-deps --no-build-isolation'
extra:
  recipe-maintainers:
  - khaled196
  - Mingkai14
package:
  name: enzywizard-substrate
  version: 1.0.2
requirements:
  host:
  - python >=
  - pip
  - setuptools
  - setuptools-git-versioning >=2.0,<3
  run:
  - python >=
  - rdkit
  - numpy
  - biopython
  - requests
  - packaging
source:
  sha256: 65c99f6e939a9f61fcb3090b5bd94bb4822dcdf93d2a7dd254124bbf39832786
  url: https://github.com/bioinfbrad/enzywizard-substrate/archive/refs/tags/1.0.2.tar.gz
test:
  commands:
  - enzywizard-substrate --help
  imports:
  - enzywizard_substrate
  - enzywizard_substrate.cli
  - enzywizard_substrate.services.substrate_service
  - enzywizard_substrate.algorithms.substrate_algorithms
