about:
  dev_url: https://github.com/huangnengCSU/compleasm
  home: https://github.com/huangnengCSU/compleasm
  license: Apache-2.0
  license_file: LICENSE
  summary: 'Compleasm: a faster and more accurate reimplementation of BUSCO'
build:
  entry_points:
  - compleasm=compleasm:main
  noarch: python
  number: 0
  run_exports:
  - null
  script:
  - -m pip install . -vv
extra:
  recipe-maintainers:
  - huangnengCSU
package:
  name: compleasm
  version: 0.2.8
requirements:
  host:
  - pip
  - python
  - setuptools
  run:
  - python
  - pandas
  - hmmer
  - miniprot >=0.11
  - sepp
  - dendropy <4.6.0
source:
  sha256: fbad2a389e13ef7bd8c9ef90112729aeaccaedba722d43f96c0fa9bcda24f1f6
  url: https://github.com/huangnengCSU/compleasm/archive/refs/tags/v0.2.8.tar.gz
test:
  commands:
  - compleasm --help
