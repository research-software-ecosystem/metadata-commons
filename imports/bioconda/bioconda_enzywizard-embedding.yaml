about:
  description: 'EnzyWizard-Embedding generates high-dimensional embeddings for each
    residue in a protein

    sequence using pretrained ESM-2 models (esm2_t6_8M, esm2_t12_35M, or esm2_t30_150M).

    It takes a cleaned FASTA file and produces a structured JSON report with residue
    embeddings.

    Useful for downstream machine learning tasks in structural bioinformatics and
    protein engineering.

    '
  home: https://github.com/bioinfbrad/enzywizard-embedding
  license: MIT
  license_file: LICENSE
  summary: Command-line tool to generate per-residue protein sequence embeddings using
    ESM-2 language models (fair-esm) from FASTA input and output a JSON report.
build:
  noarch: python
  number: 0
  run_exports:
  - null
  script: ' -m pip install . -vv --no-deps --no-build-isolation'
extra:
  recipe-maintainers:
  - khaled196
  - Mingkai14
package:
  name: enzywizard-embedding
  version: 1.0.2
requirements:
  host:
  - python >=3.10
  - pip
  - setuptools
  - setuptools-git-versioning >=2.0,<3
  run:
  - python >=3.10
  - pytorch
  - fair-esm
  - biopython
  - biotite
  - numpy
  - scipy
  - packaging
  - pyparsing
  - requests
  - tqdm
  - typing-extensions
source:
  sha256: bc23351c28f39869b7b45c96ed41e1daac1656161d90a5bf4a1b2da9015deb29
  url: https://github.com/bioinfbrad/enzywizard-embedding/archive/refs/tags/1.0.2.tar.gz
test:
  commands:
  - enzywizard-embedding --help
  imports:
  - enzywizard_embedding
  - enzywizard_embedding.cli
  - enzywizard_embedding.services.embedding_service
  - enzywizard_embedding.algorithms.embedding_algorithms
  - enzywizard_embedding.utils.embedding_utils
