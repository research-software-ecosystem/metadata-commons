about:
  dev_url: https://github.com/blab/evofr
  doc_url: https://github.com/blab/evofr/blob/0.2.1/README.md
  home: https://github.com/blab/evofr
  license: AGPL-3.0-or-later
  license_family: AGPL
  license_file: LICENSE.txt
  summary: Tools for evolutionary forecasting.
build:
  entry_points:
  - evofr = evofr.cli:main
  noarch: python
  number: 1
  run_exports:
  - null
  script: -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv
extra:
  recipe-maintainers:
  - nextstrain-bot
  - huddlej
  - joverlee521
  - marlinfiggins
  - victorlin
package:
  name: evofr
  version: 0.2.1
requirements:
  host:
  - python >=3.9
  - pip
  - poetry-core
  run:
  - python >=3.9
  - numpy >=1.22.4
  - pandas >=1.4.2
  - jax >=0.4.14,<0.5.0
  - jaxlib >=0.4.1,<0.5.0
  - numpyro >=0.13.2,<0.14.0
  - blackjax >=0.9.6,<0.10.0
  - matplotlib-base >=3.9,<4
  - seaborn-base >=0.13.2,<0.14.0
  - pyyaml >=5,<7
source:
  sha256: 547e543d20fc5f8af4437691324ac572794a28c9e891e78efec9a7676699bf57
  url: https://pypi.org/packages/source/e/evofr/evofr-0.2.1.tar.gz
test:
  commands:
  - evofr --help
  imports:
  - evofr
