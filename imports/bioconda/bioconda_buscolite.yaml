  - hatchling
  run:
  - python >=3.6
  - augustus >=3.5.0
  - miniprot
  - natsort
  - pyhmmer >=0.12.0
  - pyfastx >=2.0.0
  - packaging
source:
  sha256: 72c2cd38015bdbb6dec9f6f43671c687cc334624ba14b66438169e29d45b5beb
  url: https://pypi.io/packages/source/b/buscolite/buscolite-26.6.21.tar.gz
test:
  commands:
  - buscolite --help
  imports:
  - buscolite
